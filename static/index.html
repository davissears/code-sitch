<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Code Situation Monitor</title>
<link rel="stylesheet" href="/style.css">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="spark">✳</span>
      <div>
        <h1>Situation Monitor</h1>
        <div class="subtitle">Claude and Codex conversations on this machine</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="usage" id="usage"></div>

  <div class="searchwrap">
    <div class="provider-tabs" id="providerTabs" role="tablist" aria-label="provider filter">
      <button type="button" data-provider="all">All</button>
      <button type="button" data-provider="claude">Claude</button>
      <button type="button" data-provider="codex">Codex</button>
    </div>
    <div class="searchbox">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" autocomplete="off" spellcheck="false"
             placeholder="Filter instantly by keyword…   ↵ Enter for AI search">
      <span class="search-kbd">type to filter · ↵ AI search</span>
    </div>
    <label class="opt" title="Claude resume only: add --dangerously-skip-permissions">
      <input type="checkbox" id="optDangerous"> skip&nbsp;permissions on resume
    </label>
  </div>

  <div id="banner" class="banner hidden"></div>

  <div class="tablewrap">
    <table id="grid">
      <thead>
        <tr>
          <th class="c-status">Status</th>
          <th class="c-main">Summary</th>
          <th class="c-project">Project</th>
          <th class="c-msgs" title="Assistant responses, including tool-use steps — not the prompts you sent">Replies</th>
          <th class="c-time">Last updated</th>
          <th class="c-action"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="empty hidden"></div>
  </div>

  <footer class="foot">
    <span id="footstatus"></span>
    <span class="legend">
      <span class="dot live"></span> working &nbsp;·&nbsp;
      <span class="dot wait"></span> waiting for you &nbsp;
      <span class="lg-note">(both running → click to focus)</span> &nbsp;·&nbsp;
      <span class="dot idle"></span> inactive → click to resume
    </span>
  </footer>
</div>

<div id="toast" class="toast hidden"></div>
<script src="/app.js"></script>
</body>
</html>
